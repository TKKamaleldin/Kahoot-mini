<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SMCS Ramadan Fawazeer</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.hidden{display:none!important}
input{padding:12px;font-size:18px;width:280px;border-radius:10px;border:none}
button{padding:12px 24px;font-size:18px;border:none;border-radius:12px;cursor:pointer}
#timer{width:70px;height:70px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;font-size:28px}
.answers{width:100%;height:55vh;display:grid;grid-template-columns:1fr 1fr}
.ans{width:100%;height:100%;font-size:22px;color:#fff;border:none;transition:transform .08s ease, filter .08s ease}
.ans:active{transform:scale(.98)}
.red{background:#e21b3c}.blue{background:#1368ce}.yellow{background:#d89e00;color:#000}.green{background:#26890c}
.card{background:#1b1b1b;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.small{opacity:.85;font-size:14px}

.flash-green{animation:flashGreen .35s ease 2}
@keyframes flashGreen { 0%{background:#111} 50%{background:#0c6} 100%{background:#111} }
.flash-red{animation:flashRed .35s ease 2}
@keyframes flashRed { 0%{background:#111} 50%{background:#e21b3c} 100%{background:#111} }

.correct-btn{filter:brightness(1.15); outline:4px solid rgba(0,255,150,.55)}
.wrong-btn{filter:grayscale(.25) brightness(.85); outline:4px solid rgba(255,0,0,.35)}

.shake{animation:shake .25s ease 1}
@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

.ramadan-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  padding:10px 14px;border-radius:14px;margin-bottom:12px;
  backdrop-filter: blur(6px);
}
.ramadan-bar .title{font-size:20px;font-weight:700;letter-spacing:.3px}
.ramadan-bar .icon{font-size:22px}

#loginScreen{
  background-image: url("./images/background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
#loginScreen::before{
  content:"";position:absolute;inset:0;background: rgba(0,0,0,0.55);
}
#loginScreen .card{position:relative;z-index:1}

.bigLogo{
  position:absolute;top:18px;left:18px;
  width:140px;height:140px;object-fit:contain;
  opacity:.97;filter: drop-shadow(0 0 6px rgba(0,0,0,0.55));
  pointer-events:none;
}
@media (max-width:480px){.bigLogo{width:100px;height:100px}}
</style>
</head>

<body>

<div id="loginScreen" class="screen">
  <img src="images/logo.png" class="bigLogo" alt="University Logo">

  <div class="card">
    <div class="ramadan-bar">
      <span class="icon">🌙</span>
      <span class="title">SMCS Ramadan Fawazeer</span>
      <span class="icon">🫘🍲</span>
    </div>

    <input id="nameInput" placeholder="Name"/>
    <input id="idInput" placeholder="Student ID (202xxxxxx)"
           inputmode="numeric" maxlength="9"
           oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,9);"/>

    <button id="startBtn" onclick="startGame()">Start</button>
    <div class="small" id="loginMsg"></div>
  </div>
</div>

<div id="questionScreen" class="screen hidden">
  <img src="images/logo.png" class="bigLogo" alt="University Logo">

  <div style="display:flex;gap:14px;align-items:center">
    <div id="timer">15</div>
  </div>

  <h2 id="qText">Loading...</h2>

  <div class="answers">
    <button class="ans red" onclick="answer(0)"></button>
    <button class="ans blue" onclick="answer(1)"></button>
    <button class="ans yellow" onclick="answer(2)"></button>
    <button class="ans green" onclick="answer(3)"></button>
  </div>
</div>

<div id="resultScreen" class="screen hidden">
  <div class="card" style="text-align:center;min-width:320px">
    <h1 id="resultTitle"></h1>
    <div id="resultDetails"></div>
    <div class="small" id="sendStatus" style="margin-top:10px"></div>
  </div>
</div>

<script>
  //  Your Google Apps Script Web App URL
  const APPS_SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbzwrS96io1wXjxxSMskOFUkem3E3iWijxzb1GzHOaAT7DJ1urMcqTN9a2lCF-JqJYqpzg/exec";

  //  Open/Close window (local countdown)
  const OPEN_HOUR=11, OPEN_MIN=15;
  const CLOSE_HOUR=11, CLOSE_MIN=45;

  //  State
  let question=null;
  let cachedQuestion=null, cacheTime=0; //  preload/cache
  let userId="", name="";
  let startTime=0;
  let timer=null;
  let answered=false;

  //  Sounds
  const sfx = {
    login:"sounds/login.mp3",
    timer:"sounds/timer.mp3",
    timeup:"sounds/timeup.mp3",
    points:"sounds/points.mp3",
    correct:"sounds/correct.mp3",
    incorrect:"sounds/incorrect.mp3"
  };

  const audioPool = {};
  let currentSFX=null;
  function getAudio(src){
    if(!audioPool[src]){ audioPool[src]=new Audio(src); audioPool[src].preload="auto"; }
    return audioPool[src];
  }
  function playSound(src,vol=0.7,mode="sfx"){
    try{
      if(mode==="sfx" && currentSFX){ currentSFX.pause(); currentSFX.currentTime=0; }
      const a=getAudio(src); a.pause(); a.currentTime=0; a.volume=vol; a.play().catch(()=>{});
      if(mode==="sfx") currentSFX=a;
    }catch(e){}
  }
  function stopTimerSound(){ const t=getAudio(sfx.timer); t.pause(); t.currentTime=0; }

  // allow audio after first click
  document.addEventListener("click",()=>{ playSound(sfx.login,0.7,"sfx"); },{once:true});

  //  Time helpers
  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
  function makeTimeToday(h,m){ const d=new Date(); d.setHours(h,m,0,0); return d; }
  function isOpenNow(){
    const now=new Date();
    const openT=makeTimeToday(OPEN_HOUR,OPEN_MIN);
    const closeT=makeTimeToday(CLOSE_HOUR,CLOSE_MIN);
    return now>=openT && now<=closeT;
  }
  function nextOpenTime(){
    const now=new Date();
    const openT=makeTimeToday(OPEN_HOUR,OPEN_MIN);
    if(now<openT) return openT;
    const t=new Date(openT); t.setDate(t.getDate()+1); return t;
  }
  function formatCountdown(ms){
    const total=Math.max(0,Math.floor(ms/1000));
    const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }

  //  UI availability + countdown
  function updateAvailability(){
    const msg=document.getElementById("loginMsg");
    const btn=document.getElementById("startBtn");

    if(isOpenNow()){
      msg.innerHTML="";
      btn.disabled=false; btn.style.opacity=1; btn.style.cursor="pointer";
      return;
    }

    const diff=nextOpenTime().getTime()-Date.now();
    msg.innerHTML="🌙 <b>Stay tuned… the Fazoora will open soon</b> 🌙<br><br>"+
                  "<span style='font-size:28px;font-weight:bold'>"+formatCountdown(diff)+"</span>";
    btn.disabled=true; btn.style.opacity=.55; btn.style.cursor="not-allowed";
  }
  updateAvailability();
  setInterval(updateAvailability,1000);

  //  fetch question from server (so not visible in GitHub)
  async function fetchQuestion(){
    //  cache for 30 seconds (reduces start delay)
    if(cachedQuestion && (Date.now()-cacheTime) < 30000){
      return cachedQuestion;
    }

    const res = await fetch(APPS_SCRIPT_URL,{method:"GET"});
    const json = await res.json();
    if(!json || json.ok !== true) throw new Error("Bad response");
    if(!json.isOpen) throw new Error("Closed");

    cachedQuestion = json.question;
    cacheTime = Date.now();
    return cachedQuestion;
  }

  //  preload in background while open
  setInterval(()=>{
    if(isOpenNow()){
      fetchQuestion().catch(()=>{});
    }
  }, 5000);

  //  Start (with loading + timeout to avoid "stuck")
  async function startGame(){
    const msg=document.getElementById("loginMsg");
    const btn=document.getElementById("startBtn");

    msg.textContent="";

    // validate input
    name=document.getElementById("nameInput").value.trim();
    userId=document.getElementById("idInput").value.trim();
    userId=userId.replace(/[^0-9]/g,"").slice(0,9);
    document.getElementById("idInput").value=userId;

    if(!name){ msg.textContent="Please enter your name."; return; }
    if(!/^202\d{6}$/.test(userId)){ msg.textContent="ID must be 9 digits and start with 202."; return; }

    // local device daily lock
    const key="played_"+userId;
    if(localStorage.getItem(key)===todayKey()){
      msg.textContent="This ID already played today (not allowed).";
      return;
    }

    if(!isOpenNow()){
      updateAvailability();
      return;
    }

    // loading state
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Loading…";
    btn.style.opacity = .7;

    try{
      msg.textContent="Loading question…";

      // timeout so it won't feel stuck
      const timeoutMs = 6000;
      const timeoutPromise = new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), timeoutMs));

      question = await Promise.race([ fetchQuestion(), timeoutPromise ]);

      playSound(sfx.login,0.7,"sfx");
      show("questionScreen");
      loadQuestion();

    }catch(e){
      if(String(e.message)==="timeout"){
        msg.textContent="Network is slow… please try again.";
      }else{
        updateAvailability();
        msg.textContent="Not open yet. Please wait for the countdown.";
      }
    }finally{
      // if still on login screen, unlock button
      if(!document.getElementById("loginScreen").classList.contains("hidden")){
        btn.disabled = false;
        btn.textContent = oldText;
        btn.style.opacity = 1;
      }
    }
  }

  function loadQuestion(){
    answered=false;
    document.getElementById("qText").textContent=question.text;

    const btns=document.querySelectorAll(".ans");
    btns.forEach((b,i)=>{
      b.textContent=question.options[i];
      b.disabled=false;
      b.classList.remove("correct-btn","wrong-btn");
    });

    startTime=Date.now();
    startTimer(question.timeLimit);
  }

  function startTimer(sec){
    clearInterval(timer); stopTimerSound();
    let t=sec;
    document.getElementById("timer").textContent=t;

    timer=setInterval(()=>{
      t--;
      document.getElementById("timer").textContent=t;
      if(t>0){ playSound(sfx.timer,0.25,"timer"); }

      if(t<=0){
        clearInterval(timer);
        lockButtons(); stopTimerSound();
        if(!answered){
          flash(false);
          playSound(sfx.timeup,0.8,"sfx");
          finish(false,0,sec,true);
        }
      }
    },1000);
  }

  function lockButtons(){ document.querySelectorAll(".ans").forEach(b=>b.disabled=true); }
  function flash(correct){
    document.body.classList.remove("flash-green","flash-red");
    void document.body.offsetWidth;
    document.body.classList.add(correct ? "flash-green" : "flash-red");
  }

  function answer(choice){
    if(answered) return;
    answered=true;

    clearInterval(timer); stopTimerSound(); lockButtons();

    const elapsed=(Date.now()-startTime)/1000;
    const timeTaken=Math.min(question.timeLimit,elapsed);

    const correct=(choice===question.correctIndex);
    let score=0;

    const btns=document.querySelectorAll(".ans");
    btns[question.correctIndex].classList.add("correct-btn");
    if(!correct) btns[choice].classList.add("wrong-btn");

    if(correct){
      flash(true);
      playSound(sfx.correct,0.7,"sfx");
      score=Math.max(0,Math.floor((question.timeLimit-timeTaken)*10));
      if(score>0){ setTimeout(()=>playSound(sfx.points,0.6,"sfx"),150); }
      setTimeout(()=>finish(true,score,timeTaken,false),450);
    }else{
      flash(false);
      playSound(sfx.incorrect,0.7,"sfx");
      document.getElementById("questionScreen").classList.add("shake");
      setTimeout(()=>document.getElementById("questionScreen").classList.remove("shake"),260);
      setTimeout(()=>finish(false,0,timeTaken,false),450);
    }
  }

  async function finish(correct,score,timeTaken,timedOut){
    show("resultScreen");

    document.getElementById("resultTitle").textContent =
      timedOut ? "Time’s up!" : (correct ? "Correct!" : "Incorrect");

    //  no score shown to student
    document.getElementById("resultDetails").textContent = `Time: ${timeTaken.toFixed(1)}s`;

    const status=document.getElementById("sendStatus");
    status.textContent="Saving your result...";

    try{
      const fd=new FormData();
      fd.append("id",userId);
      fd.append("name",name);
      fd.append("score",String(score));
      fd.append("time",timeTaken.toFixed(1));

      const res=await fetch(APPS_SCRIPT_URL,{method:"POST",body:fd});
      const json=await res.json().catch(()=>({ok:true}));

      if(json && json.ok===false){
        status.textContent=json.error || "Result was not saved.";
      }else{
        status.textContent="Result saved ✅";
        localStorage.setItem("played_"+userId,todayKey());
      }
    }catch(e){
      status.textContent="Could not save result ❌";
    }
  }

  function show(id){
    ["loginScreen","questionScreen","resultScreen"].forEach(x=>{
      document.getElementById(x).classList.toggle("hidden",x!==id);
    });
  }
</script>

</body>
</html>
